<!DOCTYPE html>

<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>Dynamic Calendar JavaScript | CodingNepal
        <link rel="stylesheet" href="./website_0721.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
        

</head>

<body>
    <div class="wrapper">
        <header>
            <p class="current-date">

            <div class="icons">
                <span id="prev" class="material-symbols-rounded">chevron_left
                    <span id="next" class="material-symbols-rounded">chevron_right
            </div>
        </header>
        <div class="calendar">
            <ul class="weeks">
                <li>Sun
                <li>Mon
                <li>Tue
                <li>Wed
                <li>Thu
                <li>Fri
                <li>Sat
            </ul>
            <ul class="days">
        </div>
    </div>
    <!-- 連接bootstrap javascript -->
    <script type="text/javascript" src="./jquery.min.js"></script>
    <script type="text/javascript" src="./bootstrap-5.3.6-dist/js/bootstrap.bundle.js"></script>
    <script src="script.js"></script>
</body>

</html>
